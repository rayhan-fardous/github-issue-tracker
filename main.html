<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Github Issues Tracker</title>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
  <!-- DAISYUI -->
  <link
    href="https://cdn.jsdelivr.net/npm/daisyui@5"
    rel="stylesheet"
    type="text/css"
  />
  <!-- TAILWINDCSS -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link
    href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
    rel="stylesheet"
    type="text/css"
  />
  <!-- FontAwesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
</head>

<body class="font-geist text-sm text-neutral font-normal bg-base-200 w-full pt-20 min-h-screen">
  <!-- Header -->
  <header class="navbar bg-base-100 shadow-sm fixed top-0 left-0 w-full">
    <div class="flex-1">
      <a class="btn btn-ghost text-xl w-fit flex items-center gap-1.5">
        <img src="./assets/github-logo.png" alt="Github Logo" class="w-9">GitHub Issues Tracker
      </a>
    </div>
    <div class="flex gap-3">
      <form id="search-form" class="flex gap-2">
        <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto">
        <button type="submit" class="btn btn-primary">Search</button>
      </form>
    </div>
  </header>

  <main class="flex flex-col gap-4 p-3 w-full md:w-[80%] mx-auto container">
    <section id="tabs-container" class=" bg-base-100 p-5 rounded-sm flex flex-wrap gap-3 items-center shadow-sm">
      <button class="tab-btn active" data-tab="">All</button>
      <button class="tab-btn" data-tab="open">Open</button>
      <button class="tab-btn" data-tab="closed">Closed</button>
    </section>

    <div>
      <!-- Issues Stats -->
      <section class="w-full bg-base-100 p-5 rounded-t-sm flex flex-row gap-3 justify-between items-center shadow-sm border-b border-base-300">
        <div class="flex gap-2 items-center">
          <span class="w-10 aspect-square rounded-full bg-purple-100 grid place-content-center">
            <img src="./assets/Aperture.png" alt="Open Issue" class="w-6">
          </span>
          <div>
            <span class="text-xl font-semibold"><span id="issue-counter">50</span> Issues</span>
            <p class="text-neutral/58">Track and manage your project issues</p>
          </div>
        </div>

        <div class="flex gap-4 items-center">
          <div class="flex items-center gap-1 font-medium">
            <span class="block w-2.5 aspect-square rounded-full bg-green-600 mr-1"></span>Open
          </div>
          <div class="flex items-center gap-1 font-medium">
            <span class="block w-2.5 aspect-square rounded-full bg-purple-600 mr-1"></span>Closed
          </div>
        </div>
      </section>

      <section class="w-full bg-base-100/60 p-5 rounded-b-sm shadow-sm">
        <span id="spinner" class="loading loading-spinner loading-sm py-20 mx-auto block"></span>
        
        <div id="issue-cards-container" class="grid-cols-3 sm:grid-cols-4 gap-4 hidden" data-theme="corporate"></div>
      </section>
    </div>
  </main>


  <!-- Scripts -->
  <script src="./scripts/script.js"></script>
  <script src="./scripts/loadIssues.js"></script>
  <script src="./scripts/toggleTab.js"></script>
</body>
</html>
