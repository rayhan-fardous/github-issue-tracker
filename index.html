<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Github Issues Tracker</title>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
  <!-- DAISYUI -->
  <link
    href="https://cdn.jsdelivr.net/npm/daisyui@5"
    rel="stylesheet"
    type="text/css"
  />
  <!-- TAILWINDCSS -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link
    href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
    rel="stylesheet"
    type="text/css"
  />

</head>

<!-- Login Page -->
<body class="font-geist text-sm text-neutral font-normal bg-base-300/60 min-h-screen w-full px-3 py-10 flex justify-center items-center">
  <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-md">
    <div class="card-body">
      <img src="./assets/github-logo.png" alt="Github Logo" class="w-20 block mx-auto">
      <h1 class="text-center block text-2xl font-semibold mt-3 mb-1">Github issues Tracker</h1>
      <p class="text-sm font-normal block text-center text-neutral/60">Sign in to manage your issues</p>

      <form class="fieldset" id="login-form">
        <label class="text-neutral text-sm font-medium" for="username">Username</label>
        <input type="text" name="username" id="username" required class="input w-full" placeholder="Enter Username">
        <span class="text-xs text-primary mb-2 ">Default: admin</span>

        <label class="text-neutral text-sm font-medium" for="password">Password</label>
        <input type="password" name="password" id="password" required class="input w-full" placeholder="Enter Password">
        <span class="text-xs text-primary">Default: admin123</span>

        <button type="submit" class="btn btn-primary mt-4">Sign In</button>
      </form>

      <div class="divider">OR</div>

      <div class="flex flex-col gap-1 items-center">
        <span class="text-xs text-neutral/60">Demo Credentials:</span>
        <div class="p-4 w-full bg-base-200 rounded-lg flex flex-col justify-center items-center">
          <span class="font-semibold">
            Username: <span class="font-medium">admin</span>
          </span>
          <span class="font-semibold">
            Password: <span class="font-medium">admin123</span>
          </span>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="./scripts/script.js"></script>
  <script src="./scripts/login.js"></script>
</body>
</html>
